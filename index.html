<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRANNIK | Nordic v1.0</title>
    <style>
        :root {
            --dark-bg: #050505;
            --wolf-eye: #a0d8f0; /* Ледяной синий */
            --steel: rgba(160, 160, 160, 0.3);
            --frost: rgba(255, 255, 255, 0.03);
            --font: 'Space Mono', monospace; /* Четкий, техничный шрифт */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: var(--dark-bg); color: #fff; font-family: var(--font); 
            overflow: hidden; height: 100vh;
        }

        /* АНИМИРОВАННЫЙ ВОЛК НА ФОНЕ */
        #wolf-container {
            position: absolute; inset: 0; z-index: 1;
            background-image: url('https://w.forfun.com/fetch/f2/f2f518e3a51f08a5c36f56f10c0e1564.jpeg'); /* Прямая ссылка на волка с синими глазами */
            background-size: cover; background-position: center;
            opacity: 0.15; filter: grayscale(1) blur(1px);
            animation: breath 15s ease-in-out infinite;
            will-change: transform;
        }

        /* ИНТЕРФЕЙС */
        #ui {
            position: relative; z-index: 10; height: 100%;
            display: flex; flex-direction: column; padding: 30px 20px;
            box-sizing: border-box; justify-content: space-between;
        }

        .header h1 { 
            font-weight: 200; letter-spacing: 12px; font-size: 26px; 
            margin: 0; color: #fff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            font-family: 'Norwester', var(--font); /* Поищи Norwester или используй аналог */
        }

        .sys-line { font-size: 10px; color: var(--steel); text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }

        .frost-card {
            background: var(--frost); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(160, 160, 160, 0.1);
            border-radius: 20px; padding: 25px; margin-top: auto; margin-bottom: 20px;
        }

        .status-dot { 
            width: 8px; height: 8px; background: var(--wolf-eye); border-radius: 50%; 
            display: inline-block; margin-right: 10px; 
            box-shadow: 0 0 15px var(--wolf-eye); animation: pulse 2s infinite; 
        }

        .description { font-size: 14px; line-height: 1.7; opacity: 0.7; font-weight: 300; margin-top: 15px; }

        /* ЛЕДЯНАЯ КНОПКА СБП */
        .btn-frost {
            background: transparent; border: 1px solid var(--wolf-eye);
            color: var(--wolf-eye); border-radius: 12px;
            padding: 22px; font-size: 13px; font-weight: 800;
            letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: 0.4s;
            box-shadow: 0 0 20px rgba(160, 216, 240, 0.15);
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }

        .btn-frost:active { background: var(--wolf-eye); color: #000; transform: scale(0.96); box-shadow: 0 0 30px var(--wolf-eye); }

        /* ИКОНКИ БАНКОВ */
        .banks { display: flex; gap: 10px; justify-content: center; margin-top: 15px; opacity: 0.3; filter: grayscale(1); }
        .banks img { height: 16px; }

        @keyframes breath { 
            0%, 100% { transform: scale(1); } 
            50% { transform: scale(1.05); } 
        }
        @keyframes pulse { 0% { box-shadow: 0 0 15px var(--wolf-eye); } 50% { box-shadow: 0 0 5px var(--wolf-eye); } 100% { box-shadow: 0 0 15px var(--wolf-eye); } }

    </style>
</head>
<body>

<div id="wolf-container"></div>

<div id="ui">
    <div class="header">
        <h1>STRANNIK</h1>
        <div class="sys-line">NORDIC OS / AUTHENTICATED</div>
    </div>

    <div class="frost-card">
        <div style="font-family: monospace; font-size: 12px; display: flex; align-items: center;">
            <div class="status-dot"></div>
            WOLFSPIRIT v1.0
        </div>
        <p class="description">
            Авторизация пройдена. Локальный ИИ 'STRANNIK' загружен в ядро. <br>
            Ваш дух-наставник Волк активирован. <br>
            Поддержите проект для доступа к закрытым каналам.
        </p>
    </div>

    <button class="btn-frost" onclick="invokePayment()">
        <i class="fa-solid fa-ice-skating"></i> АКТИВИРОВАТЬ ЧЕРЕЗ ЮKASSA / СБП
    </button>
    
    <div class="banks">
        <span style="font-size: 10px; letter-spacing: 1px;">SBERPAY • TINKOFF PAY • MIR • SBP</span>
    </div>
</div>

<script>
    const wolf = document.getElementById('wolf-container');
    
    // Параллакс эффект для S23 Ultra
    if (window.DeviceOrientationEvent) {
        window.addEventListener('deviceorientation', (e) => {
            const tiltX = e.beta / 90; // Наклон вперед/назад (-1 до 1)
            const tiltY = e.gamma / 90; // Наклон влево/вправо (-1 до 1)
            
            wolf.style.backgroundPositionX = (50 - tiltY * 10) + '%';
            wolf.style.backgroundPositionY = (50 - tiltX * 10) + '%';
        });
    }

    function invokePayment() {
        if (window.navigator.vibrate) window.navigator.vibrate([30, 20, 30, 50, 30, 20, 30]); // Агрессивная вибрация
        
        // БРАТ: Сюда вставляешь свою ссылку ЮMoney/ЮKassa (как договаривались)
        window.location.href = "https://yoomoney.ru/to/41001XXXXXXXXXXXX"; 
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRANNIK | PREMIER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;600&display=swap');

        :root {
            --bg: #050505;
            --gold: #d4af37;
            --card-bg: rgba(20, 20, 20, 0.8);
            --border: rgba(212, 175, 55, 0.2);
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100%;
            overflow: hidden;
        }

        /* ПРЕМИАЛЬНЫЙ ФОН */
        .glow-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, #1a1510 0%, #050505 100%);
            z-index: -1;
        }

        /* КНОПКИ */
        .container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            padding: 80px 25px;
            box-sizing: border-box;
            text-align: center;
        }

        .main-logo {
            font-weight: 100;
            font-size: 2.5rem;
            letter-spacing: 12px;
            margin-bottom: 60px;
            color: #fff;
            text-transform: uppercase;
        }

        .action-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #fff;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: pulseIn 1s ease-out;
        }

        @keyframes pulseIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* ЭФФЕКТ ПУЛЬСАЦИИ ОПЛАТЫ */
        .pay-card {
            border: 1px solid var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
            animation: breathe 3s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 5px rgba(212, 175, 55, 0.1); }
            50% { box-shadow: 0 0 25px rgba(212, 175, 55, 0.3); border-color: #fff; }
        }

        .icon-box {
            width: 50px; height: 50px;
            background: rgba(212, 175, 55, 0.1);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin-right: 20px;
            color: var(--gold);
            font-size: 1.4rem;
        }

        .info-box { text-align: left; }
        .info-box b { display: block; font-size: 1.1rem; letter-spacing: 1px; margin-bottom: 4px; }
        .info-box span { font-size: 0.8rem; color: #888; }

        footer {
            margin-top: 100px;
            font-size: 0.6rem;
            color: #333;
            letter-spacing: 6px;
        }
    </style>
</head>
<body>

    <div class="glow-bg"></div>

    <div class="container">
        <div class="main-logo">STRANNIK</div>

        <a href="https://www.sberbank.ru/sms/pbpn?p=79604373681" class="action-card pay-card">
            <div class="icon-box"><i class="fa-solid fa-ruble-sign"></i></div>
            <div class="info-box">
                <b>Быстрая оплата</b>
                <span>Прямой перевод на 8..36-81</span>
            </div>
        </a>

        <a href="https://t.me/edomadatoem_spec" class="action-card">
            <div class="icon-box"><i class="fa-brands fa-telegram"></i></div>
            <div class="info-box">
                <b>Связь с владельцем</b>
                <span>Личный Telegram канал</span>
            </div>
        </a>

        <div class="action-card" onclick="alert('Группа: A+ (II) | Контакт: +79604373681')">
            <div class="icon-box"><i class="fa-solid fa-dna"></i></div>
            <div class="info-box">
                <b>Медицинский профиль</b>
                <span>Данные для экстренных служб</span>
            </div>
        </div>

        <footer>© 2026 // MAYKOP // PREMIUM ACCESS</footer>
    </div>

</body>
</html>

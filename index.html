<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRANNIK OS</title>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <style>
        :root { --gold: #c5a059; --black: #050505; }
        
        body, html { 
            margin: 0; padding: 0; background: var(--black); 
            color: #fff; font-family: sans-serif; overflow: hidden; height: 100%;
        }

        /* Заставка */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 40px; height: 40px; border: 2px solid rgba(197, 160, 89, 0.2);
            border-top-color: var(--gold); border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Основной экран */
        #app { opacity: 0; transition: opacity 1s ease; position: relative; height: 100vh; z-index: 10; }
        #canvas-bg { position: absolute; inset: 0; z-index: 1; }

        .content {
            position: relative; z-index: 20; height: 100%;
            display: flex; flex-direction: column; padding: 30px 20px;
            pointer-events: none; /* Чтобы можно было крутить змею пальцем */
        }

        .glass {
            background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(10px);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 20px; padding: 20px; margin-top: 20px;
        }

        h2 { letter-spacing: 5px; color: var(--gold); margin: 0; font-weight: 300; }

        .btn-pay {
            margin-top: auto; pointer-events: auto;
            background: var(--gold); color: #000; border: none;
            padding: 20px; border-radius: 15px; font-weight: bold;
            font-size: 16px; box-shadow: 0 5px 20px rgba(197, 160, 89, 0.4);
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .loaded #app { opacity: 1; }
        .loaded #loader { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="color: var(--gold); font-family: monospace; font-size: 10px; margin-top: 15px; letter-spacing: 2px;">SYNCING SYSTEM...</p>
</div>

<div id="canvas-bg"></div>

<div id="app">
    <div class="content">
        <div style="pointer-events: auto;">
            <h2>STRANNIK</h2>
            <div class="glass">
                <p style="margin:0; opacity: 0.8; font-size: 14px; line-height: 1.6;">
                    Система активна. <br>
                    Локальный ИИ готов к работе. <br>
                    Инициализация СБП...
                </p>
            </div>
        </div>

        <button class="btn-pay" onclick="pay()">ОПЛАТИТЬ ЧЕРЕЗ ЮKASSA / СБП</button>
    </div>
</div>

<script>
    let scene, camera, renderer, snake = [];

    function init() {
        try {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-bg').appendChild(renderer.domElement);

            const light = new THREE.PointLight(0xc5a059, 2, 50);
            light.position.set(5, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.3));

            const geo = new THREE.SphereGeometry(1, 24, 24);
            for(let i=0; i<30; i++) {
                const mat = new THREE.MeshStandardMaterial({ 
                    color: i === 0 ? 0xc5a059 : 0x151515,
                    metalness: 0.8, roughness: 0.2
                });
                const m = new THREE.Mesh(geo, mat);
                const s = i === 0 ? 0.7 : 0.6 * (1 - i/30);
                m.scale.set(s,s,s);
                snake.push(m);
                scene.add(m);
            }
            
            animate();
        } catch(e) {
            console.error("3D Error:", e);
            showApp(); // Если 3D упало, всё равно показываем сайт
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = Date.now() * 0.002;
        snake.forEach((s, i) => {
            const off = i * 0.25;
            s.position.x = Math.sin(t - off) * (3 + Math.sin(t*0.5)*2);
            s.position.y = Math.cos(t*0.7 - off) * 5;
            s.position.z = Math.sin(t*0.4 - off) * 3;
        });
        renderer.render(scene, camera);
    }

    function showApp() {
        document.body.classList.add('loaded');
    }

    function pay() {
        if (window.navigator.vibrate) window.navigator.vibrate(50);
        window.location.href = "https://yoomoney.ru/to/41001XXXXXXXXXXXX"; 
    }

    // Запуск
    window.onload = () => {
        init();
        setTimeout(showApp, 1000); // Гарантированный показ через 1 сек
    };

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>

</body>
</html>

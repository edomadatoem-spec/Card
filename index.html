<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRANNIK | Digital ID</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --wolf-blue: #a0d8f0;
            --frost-white: rgba(255, 255, 255, 0.9);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(160, 216, 240, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        /* Фоновый волк */
        #bg {
            position: absolute; inset: 0;
            background: url('https://w.forfun.com/fetch/f2/f2f518e3a51f08a5c36f56f10c0e1564.jpeg') center/cover;
            opacity: 0.12; filter: grayscale(1); z-index: 1;
        }

        #ui { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; padding: 30px 20px; }

        .header h1 { font-weight: 200; letter-spacing: 10px; color: var(--frost-white); margin-bottom: 5px; }
        .id-badge { font-size: 10px; color: var(--wolf-blue); letter-spacing: 2px; opacity: 0.6; }

        /* Контейнер вкладок */
        .main-card {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 24px;
            padding: 25px; margin-top: auto; margin-bottom: 20px;
        }

        /* Кнопки действий */
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }

        .action-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px; color: #fff;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            cursor: pointer; transition: 0.3s;
        }

        .action-btn i { font-size: 24px; color: var(--wolf-blue); }
        .action-btn span { font-size: 12px; font-weight: 300; letter-spacing: 1px; }
        .action-btn:active { background: var(--wolf-blue); color: #000; }
        .action-btn:active i { color: #000; }

        /* Модальное окно соцсетей */
        #social-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 100; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }

        .social-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 80%;
        }

        .social-item {
            background: var(--glass); border: 1px solid var(--border);
            padding: 20px; border-radius: 20px; display: flex; flex-direction: column;
            align-items: center; gap: 10px; text-decoration: none; color: #fff;
        }
        
        .social-item i { font-size: 30px; }
        .fa-telegram { color: #0088cc; }
        .fa-vk { color: #4c75a3; }
        .fa-whatsapp { color: #25d366; }
        .fa-instagram { color: #e1306c; }

        .close-btn {
            position: absolute; top: 40px; right: 30px;
            font-size: 30px; color: var(--wolf-blue);
        }

    </style>
</head>
<body>

<div id="bg"></div>

<div id="ui">
    <div class="header">
        <h1>STRANNIK</h1>
        <div class="id-badge">DIGITAL ARTIFACT // N0-79604373681</div>
    </div>

    <div class="main-card">
        <p style="font-size: 14px; line-height: 1.6; opacity: 0.8; font-weight: 300;">
            Доступ к системе авторизован. Выберите модуль взаимодействия для связи с владельцем или поддержки проекта.
        </p>

        <div class="actions">
            <div class="action-btn" onclick="openSocials()">
                <i class="fa-solid fa-share-nodes"></i>
                <span>СОЦ. СЕТИ</span>
            </div>
            <div class="action-btn" onclick="paySBP()">
                <i class="fa-solid fa-mobile-screen"></i>
                <span>ПЕРЕВОД СБП</span>
            </div>
        </div>
    </div>
</div>

<div id="social-modal">
    <div class="close-btn" onclick="closeSocials()">&times;</div>
    <div class="social-grid">
        <a href="https://t.me/p_strannik" class="social-item">
            <i class="fa-brands fa-telegram"></i>
            <span>TG</span>
        </a>
        <a href="https://vk.com/p_strannik" class="social-item">
            <i class="fa-brands fa-vk"></i>
            <span>VK</span>
        </a>
        <a href="https://wa.me/79604373681" class="social-item">
            <i class="fa-brands fa-whatsapp"></i>
            <span>WA</span>
        </a>
        <a href="https://instagram.com/p_strannik" class="social-item">
            <i class="fa-brands fa-instagram"></i>
            <span>INST</span>
        </a>
    </div>
</div>

<script>
    function openSocials() {
        document.getElementById('social-modal').style.display = 'flex';
        vibrate(50);
    }

    function closeSocials() {
        document.getElementById('social-modal').style.display = 'none';
    }

    function paySBP() {
        vibrate([50, 30, 50]);
        // Универсальный способ перевода через СБП (Deeplink)
        // При нажатии на S23 Ultra вылезет окно выбора банка
        window.location.href = "https://www.sberbank.ru/sms/pbpn?p=79604373681";
        
        /* Альтернатива для других банков, если хочешь именно выбор:
           window.location.href = "https://qr.nspk.ru/..."; 
           Но ссылка Сбера выше — самая стабильная в РФ для частных переводов.
        */
    }

    function vibrate(p) {
        if (window.navigator.vibrate) window.navigator.vibrate(p);
    }
</script>

</body>
</html>

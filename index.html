<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRANNIK OS | v3.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --gold: #c5a059;
            --black: #080808;
            --glass-bg: rgba(15, 15, 15, 0.85);
            --border: rgba(197, 160, 89, 0.25);
        }

        body { 
            margin: 0; background: var(--black); color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; height: 100vh;
        }

        /* Агрессивная заставка */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 1s cubic-bezier(0.8, 0, 0.2, 1);
        }

        .sys-text {
            font-family: monospace; color: var(--gold); font-size: 10px;
            text-transform: uppercase; letter-spacing: 2px; margin-top: 15px;
        }

        /* Контент */
        #main {
            height: 100vh; display: flex; flex-direction: column;
            padding: 30px 20px; box-sizing: border-box;
            z-index: 10; position: relative;
        }

        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .ui-top { text-align: left; z-index: 5; }
        .ui-top h2 { font-weight: 200; letter-spacing: 8px; margin: 0; color: var(--gold); }
        
        .card-info {
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px; padding: 25px; margin-top: 20px;
            transform: translateY(0); transition: 0.5s;
        }

        .btn-pay {
            margin-top: auto;
            background: linear-gradient(135deg, #d4af37 0%, #a68a2d 100%);
            color: #000; border: none; border-radius: 14px;
            padding: 20px; font-size: 16px; font-weight: 800;
            letter-spacing: 1px; cursor: pointer;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            z-index: 100;
        }

        .btn-pay:active { transform: scale(0.97); }

        /* Иконки банков (заглушки) */
        .pay-icons {
            display: flex; gap: 15px; justify-content: center; margin-top: 15px;
            opacity: 0.6; filter: grayscale(1);
        }
        .pay-icons img { height: 18px; }

    </style>
</head>
<body>

<div id="loader">
    <div style="width: 40px; height: 40px; border: 1px solid var(--gold); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <div class="sys-text">Initialising Strannik OS...</div>
</div>

<div id="bg-canvas"></div>

<div id="main">
    <div class="ui-top">
        <h2>STRANNIK</h2>
        <div style="width: 30px; height: 2px; background: var(--gold); margin-top: 8px;"></div>
    </div>

    <div class="card-info">
        <p style="font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 8px;">System Status</p>
        <p style="font-size: 14px; line-height: 1.6; opacity: 0.8;">Доступ разрешен. Локальный ИИ синхронизирован. Выберите метод пополнения для активации расширенных баз данных.</p>
    </div>

    <button class="btn-pay" onclick="invokePayment()">
        ОПЛАТИТЬ ЧЕРЕЗ ЮKASSA / СБП
    </button>
    
    <div class="pay-icons">
        <span style="font-size: 10px; letter-spacing: 1px;">SBERPAY • TINKOFF • MIR • SBP</span>
    </div>
</div>

<script>
    let scene, camera, renderer, snakeSegments = [];
    const count = 40;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 10;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('bg-canvas').appendChild(renderer.domElement);

        const geo = new THREE.SphereGeometry(1, 32, 32);
        for(let i=0; i<count; i++) {
            const mat = new THREE.MeshStandardMaterial({
                color: i === 0 ? 0xc5a059 : 0x111111,
                metalness: 1,
                roughness: 0.2
            });
            const mesh = new THREE.Mesh(geo, mat);
            const scale = i === 0 ? 0.6 : 0.5 * (1 - i/count);
            mesh.scale.set(scale, scale, scale);
            snakeSegments.push(mesh);
            scene.add(mesh);
        }

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 2));

        animate();
        
        setTimeout(() => {
            document.getElementById('loader').style.transform = 'translateY(-100%)';
        }, 1500);
    }

    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.0015;

        snakeSegments.forEach((seg, i) => {
            const offset = i * 0.2;
            seg.position.x = Math.sin(time - offset) * (3 + Math.sin(time * 0.5) * 2);
            seg.position.y = Math.cos(time * 0.8 - offset) * 4;
            seg.position.z = Math.sin(time * 0.3 - offset) * 3;
            
            // Плавное следование за головой
            if (i > 0) {
                seg.lookAt(snakeSegments[i-1].position);
            }
        });

        renderer.render(scene, camera);
    }

    function invokePayment() {
        if (window.navigator.vibrate) window.navigator.vibrate([50, 30, 50]);
        
        // БРАТ: Сюда вставляешь свою ссылку из ЮKassa (чеки, счета или витрина)
        // Она сама предложит человеку выбор: СБП, Карты, Apple/Tinkoff Pay
        window.location.href = "https://yoomoney.ru/to/41001XXXXXXXXXXXX"; // Твой номер кошелька или ссылка ЮKassa
    }

    init();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    @keyframes spin { to { transform: rotate(360deg); } }
</script>
</body>
</html>

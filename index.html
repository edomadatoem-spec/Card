<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRANNIK | PREMIER ACCESS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&display=swap');

        :root {
            --bg: #050505;
            --gold: #d4af37;
            --card-bg: rgba(20, 20, 20, 0.95);
            --border: rgba(212, 175, 55, 0.3);
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100%;
        }

        .background-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -10%, #1e1a11 0%, #050505 100%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            padding: 50px 25px;
            box-sizing: border-box;
            text-align: center;
        }

        .logo { font-weight: 100; font-size: 2.2rem; letter-spacing: 15px; margin-bottom: 50px; text-transform: uppercase; }

        /* ГЛАВНАЯ КНОПКА С ПУЛЬСАЦИЕЙ */
        .btn-pay {
            background: var(--card-bg);
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            animation: pulseGold 3s infinite;
        }

        @keyframes pulseGold {
            0%, 100% { box-shadow: 0 0 5px rgba(212, 175, 55, 0.2); }
            50% { box-shadow: 0 0 25px rgba(212, 175, 55, 0.4); border-color: #fff; }
        }

        .btn-pay:active { transform: scale(0.95); }

        .icon { font-size: 1.5rem; color: var(--gold); margin-right: 20px; }
        .info { text-align: left; }
        .info b { display: block; font-size: 1.1rem; letter-spacing: 1px; }
        .info span { font-size: 0.8rem; color: #777; }

        /* МОДАЛЬНОЕ ОКНО С QR */
        #qr-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .qr-card {
            background: #111;
            padding: 30px;
            border-radius: 30px;
            border: 1px solid var(--gold);
            text-align: center;
            width: 80%;
            max-width: 300px;
            position: relative;
        }

        .qr-card img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 20px;
            filter: brightness(1.1);
        }

        .close-btn {
            position: absolute;
            top: -50px; right: 0;
            color: #fff; font-size: 2rem;
        }

        /* ОСТАЛЬНЫЕ КНОПКИ */
        .btn-simple {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #fff;
        }

        footer { margin-top: 80px; font-size: 0.6rem; color: #222; letter-spacing: 5px; }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="container">
        <div class="logo">STRANNIK</div>

        <div class="btn-pay" onclick="openQR()">
            <div class="icon"><i class="fa-solid fa-qrcode"></i></div>
            <div class="info">
                <b>Оплатить через СБП</b>
                <span>Мгновенный перевод по QR</span>
            </div>
        </div>

        <a href="https://t.me/edomadatoem_spec" class="btn-simple">
            <div class="icon"><i class="fa-brands fa-telegram"></i></div>
            <div class="info">
                <b>Telegram</b>
                <span>Личный контакт</span>
            </div>
        </a>

        <footer>STRANNIK // MAYKOP // 2026</footer>
    </div>

    <div id="qr-modal" onclick="closeQR()">
        <div class="qr-card" onclick="event.stopPropagation()">
            <div class="close-btn">&times;</div>
            <img src="https://i.ibb.co/Xxd9nS8/qr-placeholder.png" id="qr-image" alt="QR Code">
            <p style="font-size: 0.9rem; color: var(--gold);">Отсканируйте или нажмите на QR для оплаты</p>
        </div>
    </div>

    <script>
        function openQR() { document.getElementById('qr-modal').style.display = 'flex'; }
        function closeQR() { document.getElementById('qr-modal').style.display = 'none'; }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRANNIK | PAY GATE</title>
    <style>
        :root { --bg: #000; --card: #111; --text: #fff; --accent: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .container { width: 90%; max-width: 400px; text-align: center; }
        .header { margin-bottom: 30px; letter-spacing: 5px; font-weight: 200; font-size: 18px; color: #888; }
        
        .bank-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .bank-btn {
            background: var(--card); border: 1px solid var(--accent);
            padding: 20px 10px; border-radius: 16px;
            text-decoration: none; color: #fff;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bank-btn:active { background: #222; transform: scale(0.96); }
        .bank-btn img { width: 35px; height: 35px; border-radius: 10px; }
        .bank-btn span { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

        .full-width { grid-column: span 2; background: #fff; color: #000; padding: 22px; margin-top: 10px; }
        .full-width span { font-size: 12px; font-weight: 800; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">ВЫБЕРИТЕ ВАШ БАНК</div>
        
        <div class="bank-grid">
            <a href="https://www.sberbank.ru/sms/pbpn?p=79604373681" class="bank-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/7/73/Sberbank_Logo_2020.svg" alt="Sber">
                <span>Сбербанк</span>
            </a>

            <a href="https://www.tinkoff.ru/rm/79604373681/xXJvM927" class="bank-btn">
                <img src="https://acdn.tinkoff.ru/static/documents/4971a81e-1f25-4c6e-8126-5a46747970d2.png" alt="T-Bank">
                <span>Т-Банк</span>
            </a>

            <a href="yoomoney://transfer/p2p?phone=79604373681" class="bank-btn">
                <img src="https://yoomoney.ru/i/yoomoney-logo-v2.png" alt="Yoomoney" style="background: #fff; padding: 2px;">
                <span>ЮMoney</span>
            </a>

            <a href="https://click.alfabank.ru/transfer/p2p?phone=79604373681" class="bank-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Alfa-Bank_Logo.svg" alt="Alfa">
                <span>Альфа</span>
            </a>

            <a href="https://www.tinkoff.ru/rm/79604373681/xXJvM927" class="bank-btn full-width">
                <span>ЛЮБОЙ ДРУГОЙ БАНК (СБП)</span>
            </a>
        </div>
    </div>

</body>
</html>
